name: home-server
services:
  unbound:
    image: madnuttah/unbound:1.24.2-1
    container_name: unbound
    # Internal recursive resolver (no public port exposure)
    networks:
      - dns_net
    volumes:
      - ./config/unbound/unbound.conf:/usr/local/unbound/etc/unbound/unbound.conf:ro
      - unbound:/usr/local/unbound/etc/unbound/var
    restart: unless-stopped
    # Exposed only inside dns_net (not published to host)
    expose:
      - "5335"
    healthcheck:
      test: /usr/local/unbound/sbin/healthcheck.sh
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  pihole:
    image: pihole/pihole:2026.02.0
    container_name: pihole
    hostname: pihole
    # Ensure Unbound is healthy before DNS service starts
    depends_on:
      unbound:
        condition: service_healthy
    # Dual-homed:
    # - dns_net for recursive resolution path
    # - proxy_net for web UI exposure via Traefik
    networks:
      - dns_net
      - proxy_net
    # Publish DNS to host (LAN clients use this as primary resolver)
    ports:
      - "${SERVER_LOCAL_IP}:53:53/tcp"
      - "${SERVER_LOCAL_IP}:53:53/udp"
    environment:
      TZ: "${TZ}"
      FTLCONF_webserver_api_password: ""  # Auth via Authelia — no direct UI password needed
      DNSMASQ_LISTENING: "${PIHOLE_DNSMASQ_LISTENING:-all}"
      # Use Unbound as upstream resolver (container name inside dns_net)
      FTLCONF_dns_upstreams: "${PIHOLE_DNS_UPSTREAMS:-unbound#5335}"
      RATE_LIMIT: "${PIHOLE_RATE_LIMIT:-0/0}"
      FTLCONF_dns_hosts: |-
        ${SERVER_LOCAL_IP:-192.168.0.10} auth.app.home.arpa
        ${SERVER_LOCAL_IP:-192.168.0.10} pihole.app.home.arpa
        ${SERVER_LOCAL_IP:-192.168.0.10} traefik.app.home.arpa
        ${SERVER_LOCAL_IP:-192.168.0.10} bentopdf.app.home.arpa
        ${SERVER_LOCAL_IP:-192.168.0.10} convertx.app.home.arpa
        ${SERVER_LOCAL_IP:-192.168.0.10} homepage.app.home.arpa
        ${SERVER_LOCAL_IP:-192.168.0.10} glances.app.home.arpa
        ${SERVER_LOCAL_IP:-192.168.0.10} dozzle.app.home.arpa
        ${SERVER_LOCAL_IP:-192.168.0.10} uptime-kuma.app.home.arpa
    volumes:
      - pihole-etc:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pihole status >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5


  authelia:
    image: authelia/authelia:4.39
    container_name: authelia
    networks:
      - proxy_net
    expose:
      - "9091"
    volumes:
      - ./config/authelia:/config:ro
      - authelia-data:/data
    environment:
      AUTHELIA_SESSION_SECRET: "${AUTHELIA_SESSION_SECRET}"
      AUTHELIA_STORAGE_ENCRYPTION_KEY: "${AUTHELIA_STORAGE_ENCRYPTION_KEY}"
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: "${AUTHELIA_JWT_SECRET}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  traefik:
    image: traefik:v3.6.11
    container_name: traefik
    # Single HTTPS ingress entrypoint
    networks:
      - pki_net
      - proxy_net
    # Traefik binds to 0.0.0.0 (all interfaces) rather than SERVER_LOCAL_IP.
    # This is required for step-ca's TLS-ALPN-01 ACME challenge: step-ca connects back to
    # Traefik via `host-gateway` (Docker Desktop: 192.168.65.254, Linux: 172.17.0.1),
    # which is not the LAN IP. Binding only to SERVER_LOCAL_IP would cause
    # "connection refused" during certificate issuance for all domains.
    # Security: no internet exposure — LAN-only access is enforced at the router (no port
    # forwarding). Docker-internal interfaces are trusted within the home network boundary.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./artifacts/pki:/certs/:ro
      - traefik-data:/data
    restart: unless-stopped
    environment:
      - SSL_CERT_FILE=/certs/root_ca.crt

  stepca:
    image: smallstep/step-ca:0.30.2
    container_name: stepca
    # Internal ACME CA (no published ports)
    networks:
      - pki_net
    volumes:
      # Persistent CA state (keys, certs)
      - stepca-data:/home/step
      # Bootstrap password (CI/local secret)
      - ./config/stepca/password.txt:/run/password.txt:ro
    environment:
      DOCKER_STEPCA_INIT_NAME: ${STEPCA_INIT_NAME:-home-arpa-ca}
      DOCKER_STEPCA_INIT_DNS_NAMES: ${STEPCA_INIT_DNS_NAMES:-stepca,stepca.home.arpa}
      DOCKER_STEPCA_INIT_ADDRESS: ${STEPCA_INIT_ADDRESS:-:9000}
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: ${STEPCA_INIT_PROVISIONER_NAME:-admin}
      DOCKER_STEPCA_INIT_PASSWORD_FILE: /run/password.txt
      DOCKER_STEPCA_INIT_ACME: ${STEPCA_INIT_ACME:-true}
    restart: unless-stopped
    # Map internal FQDNs to host gateway for ACME TLS-ALPN-01 validation.
    # Step-ca connects back to each domain on port 443 to complete the challenge.
    # host-gateway resolves to the Docker host (Docker Desktop: 192.168.65.254,
    # Linux Docker: 172.17.0.1). Each service that needs a TLS cert must be listed here.
    extra_hosts:
      - "traefik.app.home.arpa:host-gateway"
      - "auth.app.home.arpa:host-gateway"
      - "pihole.app.home.arpa:host-gateway"
      - "bentopdf.app.home.arpa:host-gateway"
      - "convertx.app.home.arpa:host-gateway"
      - "homepage.app.home.arpa:host-gateway"
      - "glances.app.home.arpa:host-gateway"
      - "dozzle.app.home.arpa:host-gateway"
      - "uptime-kuma.app.home.arpa:host-gateway"

  stepca-export:
    image: alpine:3.21
    # One-shot job to export Root CA bundle after initialization.
    # Gated behind the "init" profile — only runs on first start or after a hard reset.
    # Normal `docker compose up -d` skips this service; artifacts persist on disk.
    profiles: ["init"]
    depends_on:
      - stepca
    networks:
      - pki_net
    volumes:
      - ./artifacts/pki:/export
      - ./config/stepca/export-roots.sh:/usr/local/bin/export-roots.sh:ro
    entrypoint: ["/bin/sh", "-lc"]
    command: ["sh /usr/local/bin/export-roots.sh"]
    restart: "no"  # run once and exit

networks:
  dns_net:
    # Isolated DNS resolver network
    name: dns_net
    driver: bridge

  pki_net:
    # Isolated PKI network (StepCA & Traefik)
    name: pki_net
    driver: bridge

  proxy_net:
    # HTTPS ingress network
    name: proxy_net
    driver: bridge

volumes:
  pihole-etc:
  pihole-dnsmasq:
  unbound:
  stepca-data:
  traefik-data:
  authelia-data:
