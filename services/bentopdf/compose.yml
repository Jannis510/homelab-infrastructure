name: bentopdf

services:
  bentopdf:
    image: ghcr.io/alam00000/bentopdf:v2.7.0
    container_name: bentopdf
    # Access exclusively via Traefik — no published ports
    networks:
      - proxy_net
    expose:
      - "8080"
    restart: unless-stopped

networks:
  proxy_net:
    # Defined in the core stack (compose.yml) — must be running first
    external: true