name: stirling-pdf

services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:2.8.0
    container_name: stirling-pdf
    # Access exclusively via Traefik — no published ports
    networks:
      - proxy_net
    expose:
      - "8080"
    volumes:
      - stirling-pdf-data:/usr/share/tessdata
    environment:
      # Auth is delegated to Traefik (traefik-auth middleware)
      DOCKER_ENABLE_SECURITY: "false"
      LANGS: "${STIRLING_PDF_LANGS:-}"
    restart: unless-stopped

networks:
  proxy_net:
    # Defined in the core stack (compose.yml) — must be running first
    external: true

volumes:
  stirling-pdf-data: