name: uptime-kuma

services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.2.1
    container_name: uptime-kuma
    restart: unless-stopped
    environment:
      - NODE_EXTRA_CA_CERTS=/certs/root_ca.crt
    volumes:
      - uptime-kuma:/app/data
      - ../../artifacts/pki/root_ca.crt:/certs/root_ca.crt:ro
    expose:
      - "3001"
    networks:
      - proxy_net
      - dns_net
      - pki_net

networks:
  proxy_net:
    external: true
  dns_net:
    external: true
  pki_net:
    external: true

volumes:
  uptime-kuma: